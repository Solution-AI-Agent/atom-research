  /* ── Reset & base ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 56px 24px 40px;
    -webkit-font-smoothing: antialiased; line-height: 1.7; font-size: 14px;
  }

  /* ── Container ── */
  .container { max-width: 920px; margin: 0 auto; }

  /* ── Header ── */
  .header { margin-bottom: 32px; }
  .header-label {
    font-size: 12px; font-weight: 700; color: var(--dim);
    text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;
  }
  .header-title {
    font-size: 40px; font-weight: 800; color: var(--text);
    letter-spacing: -1.5px; line-height: 1.1;
  }
  .header-sub {
    font-size: 16px; color: var(--dim); margin-top: 10px; line-height: 1.7;
  }

  /* ── Main tabs ── */
  .main-tabs {
    display: flex; gap: 4px; background: var(--card); border-radius: 14px;
    padding: 4px; border: 1px solid var(--border2); margin-bottom: 32px; width: fit-content;
  }
  .main-tab {
    padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; color: var(--dim); background: transparent;
    border: none; font-family: inherit;
  }
  .main-tab:hover { color: var(--mid); }
  .main-tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── Sections ── */
  .section { margin-bottom: 56px; }
  .section-label {
    font-size: 12px; font-weight: 700; color: var(--dim);
    text-transform: uppercase; letter-spacing: 3px; margin-bottom: 6px;
  }
  .section-title {
    font-size: 24px; font-weight: 800; color: var(--text);
    letter-spacing: -0.5px; margin-bottom: 20px;
  }
  .section-desc {
    font-size: 14px; color: var(--dim); margin-bottom: 24px; line-height: 1.7;
  }

  /* ── Insight cards ── */
  .insight-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .insight-card {
    background: var(--card); border-radius: var(--r); border: 1px solid var(--border2);
    padding: 24px; display: flex; gap: 16px; align-items: flex-start;

  .insight-card:hover { border-color: var(--dim); }
  .insight-icon {
    font-size: 24px; flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px;

  .insight-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .insight-text { font-size: 12px; color: var(--mid); line-height: 1.6; }

  .billing-card {

  .billing-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }

  .billing-icon {

  .overlap-card { background: var(--card); border-radius: var(--r); padding: 18px; border: 1px solid var(--border2); }

  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 100;

  @media (max-width: 768px) {
    .billing-grid { grid-template-columns: 1fr; }
    .insight-grid { grid-template-columns: 1fr; }
    .agent-row { flex-direction: column; }
    .overlap-grid { grid-template-columns: 1fr; }

    .header-title { font-size: 32px; }
    .section-title { font-size: 22px; }
    th:first-child, td:first-child {

    }
    th:first-child { z-index: 3; }
    table { table-layout: auto; }
  }
  }
</style>

let state = { tab: 'personal', filterCat: '전체' };

function toggleTheme() {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const isDark = current === 'dark' || (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const next = isDark ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  render();
}

function switchTab(tab) {
  state.tab = tab;
  state.filterCat = '전체';
  render();
}

function setFilter(cat) {
  state.filterCat = cat;
  render();
}

function render() {
  const app = document.getElementById('app');
  const tab = state.tab;

  // ── Gather visible plans ──
  const visiblePlans = [];
  DATA.services.forEach(svc => {
    svc.plans.forEach(plan => {
      if ((tab === 'personal' && (plan.cat === 'personal' || plan.cat === 'both')) ||
          (tab === 'enterprise' && (plan.cat === 'enterprise' || plan.cat === 'both'))) {
        visiblePlans.push({ svc, plan });
      }
    });
  });

  // ── Filtered features ──
  const filterCat = state.filterCat;
  const filteredFeatures = filterCat === '전체'
    ? DATA.features
    : DATA.features.filter(f => f.cat === filterCat);

  // ── Group features by category ──
  const grouped = [];
  let lastCat = null;
  filteredFeatures.forEach(feat => {
    if (feat.cat !== lastCat) {
      grouped.push({ type: 'cat', cat: feat.cat });
      lastCat = feat.cat;
    }
    grouped.push({ type: 'feat', feat });
  });

  // ── Section labels ──

  <div class="header">
    <div class="header-label">AI Agent Service Comparison · 2026.03</div>
    <div class="header-title">구독 요금 &amp; 과금 모델 비교</div>
    <div class="header-sub">정액제 vs 크레딧제 — 같은 가격이라도 사용 패턴이 완전히 다릅니다</div>
  </div>`;

  // ── Nav links ──
  html += `
  <div style="display:flex;gap:8px;margin-bottom:20px">
    <a href="summary.html" style="padding:10px 18px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--text);font-size:13px;font-weight:700;text-decoration:none;transition:opacity 0.2s">Executive Summary</a>
    <a href="insights.html" style="padding:10px 18px;border-radius:8px;border:1px solid var(--border2);background:var(--card);color:var(--text);font-size:13px;font-weight:700;text-decoration:none;transition:opacity 0.2s">TCO 분석 &amp; 인사이트</a>
  </div>`;

  // ── Tabs ──
  html += `
  <div class="main-tabs">
    <button class="main-tab${tab === 'personal' ? ' active' : ''}" onclick="switchTab('personal')">개인용</button>
    <button class="main-tab${tab === 'enterprise' ? ' active' : ''}" onclick="switchTab('enterprise')">기업용</button>
  </div>`;

  // ── Feature Table Section ──
  html += `
  <div class="section">
    <div class="section-label">${tbl.label}</div>
    <div class="section-title">${tbl.title}</div>
    <div class="table-wrap">
      <div class="table-header">
        <div class="filters">
          <button class="pill${filterCat === '전체' ? ' active' : ''}" onclick="setFilter('전체')">전체</button>
          ${CATS.map(c => `<button class="pill${filterCat === c ? ' active' : ''}" onclick="setFilter('${c}')">${c}</button>`).join('')}
        </div>
      </div>
      <div class="table-inner">
        <table>
          <thead><tr>
            <th>기능</th>
            ${visiblePlans.map(({ svc, plan }) => `<th>
              <div class="col-head">
                <span class="col-dot" style="background:${svc.color}"></span>
                <span class="col-name">${svc.name}</span>
                <span class="col-tier">${plan.tier}</span>
                <span class="col-price">${plan.price}</span>
                ${plan.rec === tab ? '<span class="col-rec">추천</span>' : ''}
              </div>
            </th>`).join('')}
          </tr></thead>
          <tbody>
            <tr class="cat-row"><td colspan="${visiblePlans.length + 1}">사용량 제한</td></tr>
            <tr class="limit-row">
              <td>메시지/토큰 제한</td>
              ${visiblePlans.map(({ plan }) => `<td><span class="limit-val">${plan.limit}</span></td>`).join('')}
            </tr>
            <tr class="limit-row">
              <td>리셋 주기</td>
              ${visiblePlans.map(({ plan }) => `<td><span class="limit-val">${plan.resetCycle}</span></td>`).join('')}
            </tr>
            <tr class="limit-row">
              <td>소진 시</td>
              ${visiblePlans.map(({ plan }) => `<td><span class="limit-val">${plan.onExhaust}</span></td>`).join('')}
            </tr>
            ${grouped.map(item => {
              if (item.type === 'cat') {
                return `<tr class="cat-row"><td colspan="${visiblePlans.length + 1}">${item.cat}</td></tr>`;
              }
              const feat = item.feat;
              return `<tr>
                <td>${feat.label}</td>
                ${visiblePlans.map(({ plan }) => {
                  const v = plan.f[feat.key];
                  return `<td>${v ? '<span class="check">✓</span>' : '<span class="cross">—</span>'}</td>`;
                }).join('')}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;

  // ── Key Insights Section ──
  const insKey = 'insights' + state.tab.charAt(0).toUpperCase() + state.tab.slice(1);
  const ins = SECTION_LABELS[insKey];
  const insights = INSIGHTS[state.tab];
  html += `
  <div class="section">
    <span class="section-label">${ins.label}</span>
    <h2 class="section-title">${ins.title}</h2>
    <div class="insight-grid">
      ${insights.map(c => `
        <div class="insight-card">
          <div class="insight-icon" style="background:var(--${c.bg})">${c.icon}</div>
          <div class="insight-title">${c.title}</div>
          <div class="insight-text">${c.text}</div>
        </div>
      `).join('')}
    </div>
  </div>`;

  // ── Service Cards (Plans & Pros/Cons) ──
  const cardsKey = 'cards' + tab.charAt(0).toUpperCase() + tab.slice(1);
  const cardsLabel = SECTION_LABELS[cardsKey];
  const colorToLightBg = { '#0ea5e9': 'var(--accent-light)', '#f59e0b': 'var(--amber-light)', '#10b981': 'var(--green-light)', '#ef4444': 'var(--red-light)' };
  html += `
  <div class="section">
    <span class="section-label">${cardsLabel.label}</span>
    <h2 class="section-title">${cardsLabel.title}</h2>
    <div class="billing-grid">
      ${DATA.services.map(s => {
        const lightBg = colorToLightBg[s.color] || 'var(--accent-light)';
        const plans = s.plans.filter(p => p.cat === tab || p.cat === 'both');
        const pros = tab === 'personal' ? s.pros : s.prosEnt;
        const cons = tab === 'personal' ? s.cons : s.consEnt;
        return `<div class="billing-card">
          <div class="billing-accent" style="background:${s.color}"></div>
          <div class="billing-icon" style="background:${lightBg}">${s.icon}</div>
          <div class="billing-name">${s.name}</div>
          <div class="billing-sub">${s.sub}</div>
          <div class="billing-model" style="background:${lightBg};color:${s.color}">
            <span class="billing-model-dot" style="background:${s.color}"></span>${s.billingModel}
          </div>
          <div class="billing-tiers">
            ${plans.map(p => `<div class="billing-tier${p.rec === tab ? ' rec' : ''}">
              <span class="tier-name">${p.tier}${p.rec === tab ? '<span class="tier-rec">추천</span>' : ''}</span>
              <span class="tier-price">${p.price}</span>
            </div>`).join('')}
          </div>
          <div class="billing-divider"></div>
          <div class="pc-label" style="color:var(--green)">장점</div>
          <ul class="pc-list pros">${pros.map(t => `<li>${t}</li>`).join('')}</ul>
          <div class="pc-label" style="color:var(--red)">단점</div>
          <ul class="pc-list cons">${cons.map(t => `<li>${t}</li>`).join('')}</ul>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // ── Agent Category Map ──
  const envTagClass = { local: 'tag-local', cloud: 'tag-cloud', hybrid: 'tag-hybrid' };
  html += `
  <div class="section">
    <div class="section-label">Agent Architecture</div>
    <div class="section-title">에이전트 카테고리 & 동작 방식</div>
    <div class="section-desc" style="font-size:12px;color:var(--dim);margin-bottom:24px">같은 "에이전트"라도 실행 환경, 자율성, 접근 범위가 근본적으로 다릅니다.</div>
    ${AGENT_CATS.map(cat => `
      <div class="cat-section">
        <div class="cat-header"><span class="cat-header-icon">${cat.icon}</span><span class="cat-header-title">${cat.title}</span></div>
        <div class="cat-header-desc">${cat.desc}</div>
        <div class="agent-row">
          ${cat.agents.map(a => `
            <div class="agent-card" style="border-top:3px solid ${a.color}">
              <div class="agent-name-label">${a.name}</div>
              <div class="agent-provider">${a.provider}</div>
              <span class="agent-env-tag ${envTagClass[a.env]}">${a.envLabel}</span>
              <div class="agent-desc">${a.desc}</div>
              <div class="agent-chips">${a.chips.map(c => `<span class="agent-chip">${c}</span>`).join('')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}

    <div style="margin-top:28px">
      <div class="section-label">Architecture Comparison</div>
      <div class="section-title" style="font-size:16px;margin-bottom:14px">실행 환경 & 자율성 비교</div>
      <div class="arch-matrix">
        <table>
          <thead><tr><th>항목</th><th style="color:#f59e0b">Claude Cowork</th><th style="color:#0ea5e9">Perplexity Computer</th><th style="color:#8b5cf6">Perplexity Personal</th><th style="color:#ef4444">OpenClaw Desktop</th></tr></thead>
          <tbody>
            ${ARCH_MATRIX.map(row => `<tr><td>${row.label}</td>${row.vals.map((v, i) => `<td class="${row.check ? (row.check[i] ? 'av' : 'ax') : ''}">${v}</td>`).join('')}</tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div style="margin-top:28px">
      <div class="section-label">Overlap Analysis</div>
      <div class="section-title" style="font-size:16px;margin-bottom:14px">서비스 간 공통점 & 차이점</div>
      <div class="overlap-grid">
        ${OVERLAPS.map(o => `
          <div class="overlap-card">
            <div class="overlap-title">${o.title}</div>
            <div class="overlap-sub">${o.sub}</div>
            <div class="overlap-label" style="color:var(--green)">공통점</div>
            ${o.common.map(c => `<div class="overlap-item common">${c}</div>`).join('')}
            <div class="overlap-label" style="color:var(--amber);margin-top:8px">핵심 차이</div>
            ${o.diffs.map(d => `<div class="overlap-item diff">${d}</div>`).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  </div>`;

  // ── Footer ──
  html += `
  <div class="footer">
    가격 정보는 2026년 3월 27일 기준 · 세금 미포함 · 엔터프라이즈 요금은 별도 문의
  </div>`;

  app.innerHTML = html;
}

// ── Restore theme from localStorage ──
const saved = localStorage.getItem('theme');
if (saved) document.documentElement.setAttribute('data-theme', saved);

render();
</script>
</body>
</html>
